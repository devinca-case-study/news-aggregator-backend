services:
  app:
    build: .
    container_name: laravel_app
    volumes:
      - .:/var/www
    working_dir: /var/www
    ports:
      - "8000:8000"
    command: sh -c "php artisan config:clear && php artisan serve --host=0.0.0.0 --port=8000"
    depends_on:
      - mysql
      - redis
    networks:
      - app-network

  horizon:
    build: .
    container_name: laravel_horizon
    volumes:
      - .:/var/www
    working_dir: /var/www
    command: sh -c "php artisan config:clear && php artisan horizon"
    depends_on:
      - mysql
      - redis
    restart: unless-stopped
    networks:
      - app-network

  scheduler:
    build: .
    container_name: laravel_scheduler
    volumes:
      - .:/var/www
    working_dir: /var/www
    command: sh -c "php artisan config:clear && php artisan schedule:work"
    depends_on:
      - mysql
      - redis
    restart: unless-stopped
    networks:
      - app-network

  mysql:
    image: mysql:8
    container_name: laravel_mysql
    environment:
      MYSQL_DATABASE: news_aggregator
      MYSQL_USER: laravel
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - app-network

  redis:
    image: redis:7
    container_name: laravel_redis
    ports:
      - "6379:6379"
    networks:
      - app-network

volumes:
  mysql_data:

networks:
  app-network:
